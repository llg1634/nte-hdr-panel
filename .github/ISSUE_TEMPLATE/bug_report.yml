name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Open NTEHDRPanel
        2. Click Detect Config
        3. Click Backup and write native HDR
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Tool version
      placeholder: "0.1.1"
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11 24H2"
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Include screenshots or logs if useful. Remove personal paths if needed.
