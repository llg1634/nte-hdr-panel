name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Compile
        run: python -m py_compile app.py
      - name: Install PyInstaller
        run: python -m pip install pyinstaller
      - name: Build exe
        run: |
          pyinstaller --name NTEHDRPanel --noconsole --add-data "web;web" app.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NTEHDRPanel-windows
          path: dist/NTEHDRPanel
